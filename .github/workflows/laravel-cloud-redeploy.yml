name: Laravel Cloud redeploy

on:
  workflow_dispatch:
    inputs:
      commit_hash:
        description: 'Git commit on laravel-cloud branch (leave empty = latest)'
        required: false
        default: ''

jobs:
  redeploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deploy hook
        env:
          DEPLOY_HOOK: ${{ secrets.LARAVEL_CLOUD_DEPLOY_HOOK }}
          COMMIT: ${{ github.event.inputs.commit_hash }}
        run: |
          if [ -z "$DEPLOY_HOOK" ]; then
            echo "Missing secret LARAVEL_CLOUD_DEPLOY_HOOK"
            echo "Laravel Cloud → Environment → Settings → Deployments → Enable Deploy hook"
            exit 1
          fi
          URL="$DEPLOY_HOOK"
          if [ -n "$COMMIT" ]; then
            URL="${URL}?commit_hash=${COMMIT}"
          fi
          curl -fsS -X POST "$URL"
          echo "Deploy triggered."

      - name: Wait and probe health
        run: |
          sleep 90
          for i in 1 2 3 4 5 6; do
            code=$(curl -sS -o /tmp/health.json -w "%{http_code}" "https://laravel-main-nb0wjv.free.laravel.cloud/api/health" || true)
            echo "Attempt $i: HTTP $code"
            if [ "$code" = "200" ]; then
              cat /tmp/health.json
              exit 0
            fi
            sleep 30
          done
          echo "Health check still failing — check Laravel Cloud deployment logs."
          exit 1
