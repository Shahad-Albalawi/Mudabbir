name: Refresh composer.lock for PHP 8.5

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'backend/composer.json'
      - '.github/workflows/composer-lock-php85.yml'

permissions:
  contents: write

jobs:
  update-lock:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP 8.5
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          tools: composer

      - name: Update platform-sensitive packages
        run: |
          cd backend
          composer update nette/schema nette/utils league/config --with-all-dependencies --no-interaction

      - name: Commit lock file if changed
        run: |
          if git diff --quiet backend/composer.lock; then
            echo "composer.lock already compatible with PHP 8.5"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend/composer.lock
          git commit -m "chore: refresh composer.lock for PHP 8.5 on Laravel Cloud"
          git push
