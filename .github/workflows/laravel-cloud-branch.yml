name: Laravel Cloud deploy branch

on:
  push:
    branches: [main]
  workflow_dispatch:
  workflow_run:
    workflows: ['Refresh composer.lock for PHP 8.5']
    types: [completed]

permissions:
  contents: write

jobs:
  sync-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare backend-only tree
        run: |
          mkdir deploy-tree
          cp -a backend/. deploy-tree/
          chmod +x deploy-tree/cloud-build.sh deploy-tree/cloud-deploy.sh

      - name: Push laravel-cloud branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd deploy-tree
          git init
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Deploy backend from main@${GITHUB_SHA::7}"
          git branch -M laravel-cloud
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          git push -f origin laravel-cloud

      - name: Trigger Laravel Cloud redeploy
        env:
          DEPLOY_HOOK: ${{ secrets.LARAVEL_CLOUD_DEPLOY_HOOK }}
        run: |
          if [ -z "$DEPLOY_HOOK" ]; then
            echo "LARAVEL_CLOUD_DEPLOY_HOOK not set — add it in GitHub repo Secrets to auto-redeploy."
            exit 0
          fi
          echo "Posting deploy hook for laravel-cloud branch..."
          curl -fsS -X POST "${DEPLOY_HOOK}?commit_hash=${GITHUB_SHA}"
          echo "Deploy hook accepted."
