# Render Blueprint — Mudabbir API (PHP via Docker; Render has no native PHP runtime)
services:
  - type: web
    name: mudabbir-backend-api
    runtime: docker
    plan: free
    rootDir: backend
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: DB_CONNECTION
        value: sqlite
      - key: LOG_LEVEL
        value: warning
      - key: APP_URL
        sync: false
      - key: APP_KEY
        sync: false
